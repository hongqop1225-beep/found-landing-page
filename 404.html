<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lost connection — Found</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23F5F0EB'/%3E%3Ctext x='50' y='62' font-family='Georgia,serif' font-size='52' font-weight='700' text-anchor='middle' fill='%231A1A1A'%3EF%3C/text%3E%3Ctext x='72' y='42' font-size='22' text-anchor='middle' fill='%238B3A3A'%3E♥%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --cream: #F5F0EB;
      --warm-white: #FAFAF7;
      --soft-black: #1A1A1A;
      --muted-grey: #8A8A8A;
      --heart-red: #8B3A3A;
      --blush: #C4A882;
    }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--cream);
      color: var(--soft-black);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
      line-height: 1.7;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      box-shadow: inset 0 0 140px 20px rgba(196, 168, 130, 0.28),
                  inset 0 0 60px rgba(139, 58, 58, 0.06);
      mix-blend-mode: multiply;
    }
    .container {
      max-width: 520px;
      position: relative;
      z-index: 1;
    }
    .heart {
      font-size: 4rem;
      color: var(--heart-red);
      margin-bottom: 32px;
      display: inline-block;
      animation: heartbeat 2.4s ease-in-out infinite;
      opacity: 0.85;
    }
    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      15% { transform: scale(1.15); }
      30% { transform: scale(1); }
      45% { transform: scale(1.1); }
      60% { transform: scale(1); }
    }
    .code {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      color: var(--muted-grey);
      letter-spacing: 4px;
      margin-bottom: 16px;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.4rem;
      font-weight: 600;
      line-height: 1.2;
      margin-bottom: 20px;
    }
    h1 em {
      color: var(--heart-red);
      font-style: italic;
    }
    p {
      color: var(--muted-grey);
      font-size: 1.05rem;
      margin-bottom: 36px;
    }
    .home-link {
      display: inline-block;
      padding: 14px 36px;
      background: var(--soft-black);
      color: var(--warm-white);
      text-decoration: none;
      border-radius: 100px;
      font-size: 0.95rem;
      font-weight: 500;
      letter-spacing: 0.3px;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .home-link:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
    }
    @media (max-width: 600px) {
      h1 { font-size: 1.8rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="heart">♥</div>
    <div class="code">404</div>
    <h1>Looks like we <em>lost</em> this connection.</h1>
    <p>The page you're looking for has wandered off. But the right one is always closer than you think.</p>
    <a href="/" class="home-link">Take me home</a>
  </div>
</body>
</html>
